services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    #
    # INSTALLER
    #

    InSquare\OpendxpFaviconBundle\Installer:
        public: true
        arguments:
            $bundle: "@=service('kernel').getBundle('InSquareOpendxpFaviconBundle')"

    InSquare\OpendxpFaviconBundle\Service\FaviconGenerator:
        arguments:
            $manifestName: '%in_square_opendxp_favicon.manifest_name%'
            $manifestBasePath: '%in_square_opendxp_favicon.manifest_base_path%'

    InSquare\OpendxpFaviconBundle\Twig\Extension\FaviconExtension:
        arguments:
            $themeColor: '%in_square_opendxp_favicon.theme_color%'
            $tileColor: '%in_square_opendxp_favicon.tile_color%'

    #
    # CONTROLLERS
    #

    InSquare\OpendxpFaviconBundle\Controller\:
        resource: '../../Controller'
        public: true
        tags: ['controller.service_arguments']

    InSquare\OpendxpFaviconBundle\:
        resource: '../../'
        exclude:
            - '../../Controller/'
            - '../../DependencyInjection/'
            - '../../Installer.php'
            - '../../Resources/'
            - '../../Service/FaviconGenerator.php'
            - '../../Twig/Extension/FaviconExtension.php'
            - '../../InSquareOpendxpFaviconBundle.php'
